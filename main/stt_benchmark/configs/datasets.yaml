datasets:
  tts_generated:
    type: manifest
    manifest_path: datasets/tts_generated/manifest.jsonl
    description: "TTS pipeline output — primary benchmark dataset"
    group_by: [tts_model, case_study]

  librispeech_test_clean:
    type: manifest
    manifest_path: datasets/librispeech/test-clean_manifest.jsonl
    description: "LibriSpeech test-clean — clean read speech (2,620 utterances)"
    download_url: "https://www.openslr.org/resources/12/test-clean.tar.gz"
    subset: test-clean
    run_flag: "--dataset librispeech --subset test-clean"

  librispeech_test_other:
    type: manifest
    manifest_path: datasets/librispeech/test-other_manifest.jsonl
    description: "LibriSpeech test-other — challenging accents and noise (2,939 utterances)"
    download_url: "https://www.openslr.org/resources/12/test-other.tar.gz"
    subset: test-other
    run_flag: "--dataset librispeech --subset test-other"

  tedlium:
    type: manifest
    manifest_path: datasets/tedlium/tedlium_test_manifest.jsonl
    description: "TED-LIUM 3 test — spontaneous lecture speech (1,155 utterances)"
    source: huggingface
    hf_repo: "LIUM/tedlium"
    hf_split: "test"
    run_flag: "--dataset tedlium"

  voxpopuli:
    type: manifest
    manifest_path: datasets/voxpopuli/voxpopuli_test_manifest.jsonl
    description: "VoxPopuli EN test — European Parliament recordings (1,842 utterances)"
    source: huggingface
    hf_repo: "facebook/voxpopuli"
    hf_config: "en"
    hf_split: "test"
    run_flag: "--dataset voxpopuli"

  commonvoice_en:
    type: manifest
    manifest_path: datasets/commonvoice/commonvoice_en_test_manifest.jsonl
    description: "Common Voice EN test — crowdsourced, demographically diverse"
    source: huggingface
    hf_repo: "mozilla-foundation/common_voice_17_0"
    hf_config: "en"
    hf_split: "test"
    requires_hf_login: true
    run_flag: "--dataset commonvoice --cv-lang en"
    note: "Requires HuggingFace login and acceptance of dataset terms"

  earnings22:
    type: manifest
    manifest_path: datasets/earnings22/earnings22_test_manifest.jsonl
    description: "Earnings22 — financial earnings calls, domain-specific vocabulary"
    source: huggingface
    hf_repo: "revdotcom/earnings22"
    hf_split: "test"
    run_flag: "--dataset earnings22"

  kincaid46:
    type: manifest
    manifest_path: datasets/kincaid46/kincaid46_manifest.jsonl
    description: "Kincaid46 — 46 diverse speaker recordings, local files required"
    source: local
    run_flag: "--dataset kincaid --kincaid-dir /path/to/kincaid46"
    note: "Must provide --kincaid-dir path to local audio directory"

  silence_noise:
    type: directory
    audio_dir: datasets/silence_noise
    description: "Synthetic silence and pink noise — hallucination testing baseline"
    auto_generate: true
    run_flag: "(auto-generated by run_all.sh step 0)"
